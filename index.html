<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seoul Map + Photos</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
  #map { height: 100vh; width: 100%; }

  .leaflet-popup-content-wrapper { border-radius: 12px !important; padding: 0 !important; overflow: hidden; }
  .leaflet-popup-content { margin: 0 !important; width: min(340px, calc(100vw - 60px)) !important; }

  .photo-gallery { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; background: #111; height: 220px; }
  .photo-gallery::-webkit-scrollbar { height: 6px; }
  .photo-gallery::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.5); border-radius: 3px; }
  .photo-gallery img { scroll-snap-align: start; height: 220px; min-width: 240px; max-width: 400px; object-fit: cover; flex-shrink: 0; cursor: pointer; transition: opacity 0.15s; background: #222; }
  .photo-gallery img:hover { opacity: 0.85; }
  .photo-loading { height: 220px; display: flex; align-items: center; justify-content: center; background: #1a1a2e; color: #888; font-size: 14px; width: 100%; }
  .photo-empty { height: 80px; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); color: #99a; font-size: 13px; width: 100%; flex-direction: column; gap: 6px; }
  .photo-empty a { color: #60a5fa; text-decoration: none; font-size: 13px; }
  .photo-empty a:hover { text-decoration: underline; }
  .photo-count { position: absolute; top: 8px; right: 8px; background: rgba(0,0,0,0.6); color: white; font-size: 11px; padding: 2px 8px; border-radius: 10px; pointer-events: none; z-index: 10; }

  .popup-body { padding: 12px 14px 14px; }
  .popup-name { font-weight: 700; font-size: 15px; line-height: 1.3; }
  .popup-kr { font-weight: 400; font-size: 13px; color: #666; }
  .popup-type { color: #888; font-size: 12px; margin-top: 2px; }
  .popup-info { font-size: 13px; margin-top: 6px; line-height: 1.4; }
  .popup-hours { color: #059669; font-size: 12px; margin-top: 4px; }
  .popup-warn { color: #dc2626; font-size: 12px; margin-top: 2px; }
  .popup-addr { color: #999; font-size: 11px; margin-top: 4px; }
  .popup-dur { color: #7c3aed; font-size: 12px; margin-top: 2px; }
  .popup-naver { display: inline-block; margin-top: 8px; padding: 5px 12px; background: #03c75a; color: white; text-decoration: none; border-radius: 6px; font-size: 12px; font-weight: 600; }
  .popup-naver:hover { background: #02b350; }
  .popup-io { display: inline-block; margin-top: 4px; font-size: 11px; background: #f0f0f0; padding: 2px 8px; border-radius: 4px; }
  .io-filter { margin-top: 8px; padding-top: 8px; border-top: 1px solid #eee; }
  .io-btn { cursor: pointer; padding: 3px 8px; border-radius: 4px; font-size: 12px; border: 1px solid #ddd; background: white; margin: 2px; }
  .io-btn.active { background: #3b82f6; color: white; border-color: #3b82f6; }

  .legend { background: white; padding: 10px 14px; border-radius: 10px; box-shadow: 0 2px 12px rgba(0,0,0,0.15); font-size: 13px; max-height: 65vh; overflow-y: auto; }
  .legend-title { font-weight: 700; font-size: 15px; margin-bottom: 6px; display: flex; align-items: center; justify-content: space-between; }
  .legend-toggle { display: none; background: none; border: none; font-size: 18px; cursor: pointer; padding: 0 4px; }
  .legend-body { }
  .legend-body.collapsed { display: none; }
  .filter-btn { cursor: pointer; padding: 3px 0; display: flex; align-items: center; gap: 6px; transition: opacity 0.15s; }
  .filter-btn:hover { opacity: 0.7; }
  .filter-btn.off { opacity: 0.35; text-decoration: line-through; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }

  @media (max-width: 600px) {
    .legend { max-height: 50vh; padding: 8px 10px; font-size: 12px; max-width: 180px; }
    .legend-toggle { display: inline-block; }
    .filter-btn { padding: 6px 0; min-height: 32px; }
    .io-btn { padding: 6px 10px; font-size: 13px; min-height: 36px; }
    .dot { width: 12px; height: 12px; }
    .popup-body { padding: 10px 12px 12px; }
    .popup-name { font-size: 14px; }
    .popup-info { font-size: 12px; }
    .fs-nav { width: 44px; height: 60px; font-size: 28px; }
    .fs-prev { left: 6px; }
    .fs-next { right: 6px; }
    .fs-close { top: 10px; right: 12px; font-size: 28px; }
    .photo-gallery { height: 180px; }
    .photo-gallery img { height: 180px; min-width: 200px; }
  }

  .fullscreen-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92); z-index: 10000; align-items: center; justify-content: center; flex-direction: column; }
  .fullscreen-overlay.active { display: flex; }
  .fullscreen-overlay img { max-width: 92vw; max-height: 85vh; object-fit: contain; border-radius: 4px; user-select: none; }
  .fs-counter { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 12px; }
  .fs-nav { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.15); border: none; color: white; font-size: 36px; width: 50px; height: 70px; cursor: pointer; border-radius: 8px; transition: background 0.15s; z-index: 10001; }
  .fs-nav:hover { background: rgba(255,255,255,0.3); }
  .fs-prev { left: 16px; }
  .fs-next { right: 16px; }
  .fs-close { position: absolute; top: 16px; right: 20px; background: none; border: none; color: rgba(255,255,255,0.7); font-size: 32px; cursor: pointer; z-index: 10001; }
  .fs-close:hover { color: white; }
</style>
</head>
<body>
<div id="map"></div>
<div class="fullscreen-overlay" id="fs" onclick="if(event.target===this)closeFs()">
  <button class="fs-close" onclick="closeFs()">✕</button>
  <button class="fs-nav fs-prev" onclick="event.stopPropagation();fsNav(-1)">‹</button>
  <img id="fs-img">
  <button class="fs-nav fs-next" onclick="event.stopPropagation();fsNav(1)">›</button>
  <div class="fs-counter" id="fs-counter"></div>
</div>

<script>
const map = L.map('map').setView([37.5550, 126.9800], 12);
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap', maxZoom: 19 }).addTo(map);

const C = {
  palace:'#8b5cf6', park:'#22c55e', view:'#f59e0b', photo:'#ec4899',
  market:'#f97316', district:'#6366f1', museum:'#0ea5e9', event:'#ef4444',
  hidden:'#14b8a6', trek:'#84cc16', shop:'#d946ef',
  gf_ded: '#16a34a',
  gf_opt: '#3b82f6'
};
const CAT = {
  palace:{n:'🏛️ Дворцы',e:'🏛️'}, park:{n:'🌳 Парки',e:'🌳'}, view:{n:'🌅 Смотровые',e:'🌅'},
  photo:{n:'📸 Фото-споты',e:'📸'}, market:{n:'🛒 Рынки',e:'🛒'}, district:{n:'🏘️ Районы',e:'🏘️'},
  museum:{n:'🖼️ Музеи',e:'🖼️'}, event:{n:'🎪 События',e:'🎪'}, hidden:{n:'💎 Hidden gems',e:'💎'},
  trek:{n:'🥾 Треккинг',e:'🥾'}, shop:{n:'🛍️ Шоппинг',e:'🛍️'},
  gf_ded: {n: '🥬 GF 100% dedicated', e: '🥬'},
  gf_opt: {n: '🍽️ GF опции в меню', e: '🍽️'}
};

const layers = {};
Object.keys(CAT).forEach(k => { layers[k] = L.layerGroup().addTo(map); });

function mkIcon(color, emoji) {
  return L.divIcon({
    className: '',
    html: `<div style="width:30px;height:30px;background:${color};border:2.5px solid white;border-radius:50%;box-shadow:0 2px 6px rgba(0,0,0,0.3);display:flex;align-items:center;justify-content:center;font-size:15px;line-height:1">${emoji}</div>`,
    iconSize: [30,30], iconAnchor: [15,15], popupAnchor: [0,-17]
  });
}

const photoCache = {};

async function fetchPhotos(lat, lng, name, searchQuery, krName) {
  const key = searchQuery || name;
  if (photoCache[key]) return photoCache[key];

  const urls = [];
  const seen = new Set();

  const junk = /\b(map|logo|icon|diagram|plan|stamp|flag|seal|coat.of.arms|signing|certificate|svg|ticket|layout|floor.plan|route|schema|emblem|badge)\b/i;

  function parse(data) {
    if (!data.query || !data.query.pages) return;
    Object.values(data.query.pages).forEach(p => {
      if (p.imageinfo) {
        const ii = p.imageinfo[0];
        const title = p.title || '';
        const isJunk = junk.test(title) || ii.mime === 'image/svg+xml' || (ii.thumburl && ii.thumburl.includes('.svg'));
        if (ii.mime && ii.mime.startsWith('image/') && ii.thumburl && !seen.has(ii.thumburl) && !isJunk) {
          seen.add(ii.thumburl);
          urls.push({ thumb: ii.thumburl, full: ii.url });
        }
      }
    });
  }

  async function search(query, limit) {
    try {
      const q = encodeURIComponent(query);
      const r = await fetch(`https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=${q}&gsrlimit=${limit}&gsrnamespace=6&prop=imageinfo&iiprop=url|mime&iiurlwidth=200&format=json&origin=*`);
      return await r.json();
    } catch(e) { return {}; }
  }

  // ПАРАЛЛЕЛЬНО: English + Korean + Geosearch одновременно
  const promises = [search(searchQuery || name + ' Seoul', 12)];
  if (krName) promises.push(search(krName, 8));
  promises.push(fetch(`https://commons.wikimedia.org/w/api.php?action=query&generator=geosearch&ggscoord=${lat}|${lng}&ggsradius=500&ggslimit=6&prop=imageinfo&iiprop=url|mime&iiurlwidth=200&format=json&origin=*`).then(r=>r.json()).catch(()=>({})));

  const results = await Promise.all(promises);
  results.forEach(d => parse(d));

  photoCache[key] = urls.slice(0, 12);
  return photoCache[key];
}

let fsPhotos = [];
let fsIndex = 0;

function openFull(url) {
  // Find all photos in current popup gallery
  const gallery = document.querySelector('.photo-gallery');
  if (gallery) {
    fsPhotos = Array.from(gallery.querySelectorAll('img')).map(img => {
      const onclick = img.getAttribute('onclick') || '';
      const match = onclick.match(/openFull\('([^']+)'\)/);
      return match ? match[1] : img.src;
    });
    fsIndex = fsPhotos.indexOf(url);
    if (fsIndex === -1) fsIndex = 0;
  } else {
    fsPhotos = [url];
    fsIndex = 0;
  }
  showFsPhoto();
  document.getElementById('fs').classList.add('active');
}

function showFsPhoto() {
  document.getElementById('fs-img').src = fsPhotos[fsIndex];
  document.getElementById('fs-counter').textContent = `${fsIndex + 1} / ${fsPhotos.length}  ←→`;
}

function fsNav(dir) {
  fsIndex = (fsIndex + dir + fsPhotos.length) % fsPhotos.length;
  showFsPhoto();
}

function closeFs() {
  document.getElementById('fs').classList.remove('active');
}

document.addEventListener('keydown', (e) => {
  const fs = document.getElementById('fs');
  if (!fs.classList.contains('active')) return;
  if (e.key === 'ArrowRight' || e.key === 'ArrowDown') { e.preventDefault(); fsNav(1); }
  else if (e.key === 'ArrowLeft' || e.key === 'ArrowUp') { e.preventDefault(); fsNav(-1); }
  else if (e.key === 'Escape') { closeFs(); }
});

function add(cat, lat, lng, name, kr, type, info, hours, warn, addr, search, io, dur, insta) {
  const ic = mkIcon(C[cat], CAT[cat].e);
  const marker = L.marker([lat, lng], {icon: ic}).addTo(layers[cat]);
  marker.options.io = io || 'both';
  const sq = search || name;

  // Preload фото при наведении — к моменту клика уже в кэше
  marker.on('mouseover', () => { fetchPhotos(lat, lng, name, sq, kr); });

  marker.on('click', async function() {
    // Show loading popup first
    marker.unbindPopup();
    marker.bindPopup(`<div class="photo-loading">📷 Загрузка...</div>`, {maxWidth: 340, minWidth: 340}).openPopup();

    // Fetch photos (из кэша если preload успел)
    const photos = await fetchPhotos(lat, lng, name, sq, kr);

    // Build full popup with photos
    let html = '';
    if (photos.length > 0) {
      html += `<div style="position:relative"><div class="photo-gallery">`;
      photos.forEach(p => {
        html += `<img src="${p.thumb}" decoding="async" onclick="event.stopPropagation();openFull('${p.full}')" alt="photo">`;
      });
      html += `</div><div class="photo-count">${photos.length} фото — свайп →</div></div>`;
    } else if (insta) {
      html += `<div class="photo-empty">📷 Фото в открытых источниках нет<a href="https://instagram.com/${insta}" target="_blank">📸 @${insta} в Instagram</a></div>`;
    } else {
      html += `<div class="photo-empty">📷 Фото в открытых источниках нет</div>`;
    }
    html += `<div class="popup-body">`;
    html += `<div class="popup-name">${CAT[cat].e} ${name} <span class="popup-kr">${kr||''}</span></div>`;
    html += `<div class="popup-type">${type}</div>`;
    if (info) html += `<div class="popup-info">${info}</div>`;
    if (hours) html += `<div class="popup-hours">🕐 ${hours}</div>`;
    if (dur) html += `<div class="popup-dur">⏱️ ${dur}</div>`;
    if (warn) html += `<div class="popup-warn">⚠️ ${warn}</div>`;
    if (addr) html += `<div class="popup-addr">📍 ${addr}</div>`;
    if (io) { const badge = io==='in'?'🏠 Indoor':io==='out'?'☀️ Outdoor':'🏠☀️ Indoor+Outdoor'; html += `<div class="popup-io">${badge}</div>`; }
    html += `<a class="popup-naver" href="https://map.naver.com/v5/search/${encodeURIComponent(kr || name)}" target="_blank">🗺️ Открыть в Naver Map</a>`;
    html += `</div>`;

    // Replace popup content
    marker.getPopup().setContent(html);
    marker.getPopup().update();
  });
}

// === ДВОРЦЫ ===
add('palace',37.5796,126.9770,'Gyeongbokgung','경복궁','Главный дворец Чосон (1395)','Самый большой и парадный дворец Сеула — тронный зал Кынджонджон, павильон Хянвонджон на озере, королевские сады. Смена стражи в костюмах Чосон у главных ворот Кванхвамун (10:00 и 14:00). Royal Pass 10,000₩ даёт вход во все 5 дворцов на 3 месяца. В ханбоке (прокат у ворот ~15,000₩) вход бесплатный','09:00–18:00, Вт выходной',null,'서울 종로구 사직로 161',null,'out','2–3 ч');
add('palace',37.5794,126.9910,'Changdeokgung','창덕궁','ЮНЕСКО + Тайный сад','Признан ЮНЕСКО наиболее хорошо сохранившимся дворцом Кореи — природный ландшафт здесь вписан в архитектуру, а не подстроен под неё. Главная достопримечательность — Тайный сад (후원): 78 видов деревьев, пруды, павильоны, прогулка с гидом ~1.5 ч; билеты 8,000₩ нужно бронировать онлайн заранее. В ханбоке (прокат у входа ~15,000₩) вход в дворец бесплатный','09:00–18:00, Пн выходной',null,'서울 종로구 율곡로 99',null,'out','2–3 ч');
add('palace',37.5787,126.9952,'Changgyeonggung','창경궁','Самый зелёный, открыт до 21:00','Менее туристический, зато открыт до 21:00 — вечерняя подсветка павильонов и зелёные сады без толп. Внутри — красивый пруд Чунгданджи с водяными лилиями, теплицы с тропическими растениями. Вход всего 1,000₩. Хорошо совмещать с прогулкой в Чхандоккун рядом','09:00–21:00, Пн выходной',null,'서울 종로구 창경궁로 185',null,'out','1.5–2 ч');
add('palace',37.5658,126.9751,'Deoksugung','덕수궁','Единственный с западными постройками','Единственный дворец Чосон с западными зданиями в европейском стиле — интересный контраст традиционного и колониального. Вход 1,000₩, смена стражи у ворот Тэхвамун (11:00 и 14:00) красивее чем в Кёнбоккун — можно встать вплотную. Рядом — каменная стена Тонднэмун и уютная галерея Сонгок с современным искусством','09:00–21:00, Пн выходной',null,'서울 중구 세종대로 99',null,'out','1–1.5 ч');
add('palace',37.5711,126.9681,'Gyeonghuigung','경희궁','Западный дворец, мало туристов','Бесплатно, и это видно по количеству туристов — почти никого. Бывший западный дворец Сеула, в 20 веке был разрушен и частично восстановлен. Можно неспешно пройти сад и главный зал без очередей и без ограды. Хорошая точка отдыха между Кёнбоккун и Чхонгечхон','09:00–18:00, Пн выходной',null,'서울 종로구 새문안로 45',null,'out','1 ч');

// === ПАРКИ ===
add('park',37.5443,127.0377,'Seoul Forest','서울숲','Олени, озеро, пикник, Сонгсу рядом','Огромный парк с оленьим загоном (можно кормить через сетку), озером с фонтанами и широкими лужайками для пикника. Весной — аллеи цветущих деревьев и толпы с пледами. Через мост — район Сонгсу с дизайнерскими кафе и поп-ап магазинами. Велосипеды напрокат у главного входа ~5,000₩/ч','Круглосуточно',null,'서울 성동구 뚝섬로 273',null,'out','2–3 ч');
add('park',37.5133,126.9177,'Yeouido Hangang Park','여의도 한강공원','Seoul Spring Festival, пикник, велосипеды','Главное место Seoul Spring Festival в апреле — поле цветущих рапсовых цветов прямо у реки. В обычные дни: велосипеды напрокат, пикник-наборы (плед + тарелки) у метро, кафе и стритфуд вдоль берега. Вечером над рекой включают фонтаны. Самый оживлённый ханганский парк — лучший для "сеульской атмосферы"','Круглосуточно',null,'서울 영등포구 여의동로 330',null,'out','2–3 ч');
add('park',37.5103,126.9950,'Banpo Hangang Park','반포한강공원','Радужный фонтан 20:00–21:00, пикник','Знаменитый Радужный фонтан — самый длинный мостовой фонтан в мире, запускают в 20:00–21:00 с подсветкой. Сюда доставляют чикен + макголли прямо на берег через приложение (чимэк-культура!). Лежаки, гамаки, ровные дорожки для прогулок вдоль воды. Рядом — плавучий остров SEVIT с ресторанами','Круглосуточно',null,'서울 서초구 신반포로11길 40','Banpo Bridge Rainbow Fountain Seoul','out','1–2 ч');
add('park',37.5167,127.1155,'Olympic Park','올림픽공원','Скульптуры, "Одинокое дерево", зелень','200 скульптур под открытым небом разбросаны по всему парку — неожиданные встречи за каждым поворотом. "Одинокое дерево" (나홀로 나무) в поле — культовое место для фото. 88 гектаров ровного зелёного пространства, почти нет туристов — только местные с семьями. Рядом — Lotte World и озеро Соктхон','05:00–22:00',null,'서울 송파구 올림픽로 424',null,'out','2–3 ч');
add('park',37.5090,127.1030,'Seokchon Lake','석촌호수','Озеро + Lotte Tower отражение, сакура','Круглое озеро вокруг которого идёт тропа ~3 км — идеально для неспешной прогулки. Главный кадр: Lotte Tower 555 м отражается в воде — особенно красиво ночью с подсветкой и в апреле когда цветёт сакура прямо над берегом. Рядом вход в Lotte World и масса кафе с террасами над водой','Круглосуточно',null,'서울 송파구 잠실로 148',null,'out','1–2 ч');
add('park',37.5667,126.9680,'Cheonggyecheon','청계천','Ручей 5.8 км в центре, подсветка вечером','Ручей длиной 5.8 км пробит сквозь центр города — под землёй убрали скоростное шоссе и открыли воду. Вдоль берега: арт-инсталляции, цветочные посадки, скамейки прямо над водой. Вечером включают световое шоу и фонарики. Отличный маршрут от Чхонгечхонно к рынку Кванджан — около 45 мин пешком','Круглосуточно',null,'서울 종로구 서린동 청계천로',null,'out','1–2 ч');
add('park',37.5840,126.9100,'Haneul Park','하늘공원','Вид 360° на весь Сеул','Бывшая мусорная свалка, превращённая в парк с видом на весь Сеул на 360° — включая Намсан, Ханган и горы. Особенно красиво осенью когда поля серебристого ковыля волнуются на ветру. Наверх: пешком 291 ступень или электробус (бесплатно, работает не всегда). Рядом парк Экопарк с прудами и гравийными дорожками','Круглосуточно','291 ступень или электробус','서울 마포구 하늘공원로 95',null,'out','1.5–2 ч');
add('park',37.5355,126.8985,'Seonyudo Park','선유도공원','Остров-экопарк, бывший водоочистной завод','Бывший водоочистной завод на острове реки Ханган, переделанный в экопарк — бетонные фильтры стали аквариумами, цистерны — садами. Место необычно архитектурно: растения растут прямо в старых резервуарах. Добраться на мост пешком — уже часть опыта. Тихо, местных мало, туристов почти нет','06:00–24:00',null,'서울 영등포구 선유로 343',null,'out','1.5–2 ч');
add('park',37.4892,126.9235,'Boramae Park','보라매공원','Местный парк, 겹벚꽃 в апреле','Спокойный районный парк, популярный у местных семей — мало туристов, много зелени. В апреле цветут겹벚꽃 (махровая сакура с пышными двойными лепестками) — более редкий вид чем обычная. Пруды, беговые дорожки, площадки для бадминтона. Хороший вариант для пикника без толп Ёыйдо','Круглосуточно',null,'서울 동작구 여의대방로20길 33',null,'out','1–2 ч');

add('view',37.5512,126.9882,'N Seoul Tower','N서울타워','360° панорама, замки любви, канатная дорога','Башня на горе Намсан — самая известная смотровая Сеула с видом на 360°: видно весь город, Ханган и горы. Наверх: канатная дорога 15,000₩ от метро Мёндон или пешком ~40 мин через лесной парк. На площадке — тысячи замков любви на перилах, телескопы, ресторан с вращающимся полом. Билет на смотровую 29,000₩, вид с террасы снаружи — бесплатно','10:00–23:00',null,'서울 용산구 남산공원길 105',null,'both','1.5–2 ч');
add('view',37.5126,127.1025,'Seoul Sky','서울스카이','555м, стеклянный пол, 123 этаж','Смотровая на 123-м этаже башни Lotte World Tower — второй по высоте в Азии. На 118-м этаже — стеклянный пол: стоишь над пустотой и видишь город под ногами. 31,000₩ — дорого, но другого такого угла нет: Ханган, Олимпийский парк, весь Сеул до горизонта. Лучшее время — закат (1.5 ч до темноты): небо меняет цвет, потом включается ночная подсветка города. Дети до 36 месяцев бесплатно','10:30–22:00/23:00',null,'서울 송파구 올림픽로 300',null,'in','1–1.5 ч');

add('photo',37.5474,126.9965,'DDP','동대문디자인플라자','Заха Хадид. LED розы ночью, зеркальный фасад','Футуристическое здание без единого прямого угла — архитектурный проект Захи Хадид, одно из самых фотографируемых в Азии. Вход на территорию бесплатный: снимай зеркальный серебристый фасад с разных углов. Главный кадр — LED-инсталляция из тысяч светящихся роз перед зданием: ночью особенно впечатляет. Внутри — дизайн-выставки и магазины, но главное всё равно снаружи','Круглосуточно снаружи',null,'서울 중구 을지로 281','Dongdaemun Design Plaza architecture night Seoul','out','1–1.5 ч');
add('photo',37.5095,127.0590,'Starfield Library','별마당 도서관','13м стеллажи в COEX. Топ Инстаграм','Библиотека внутри торгового центра COEX с 13-метровыми стеллажами до потолка — место входит в каждый список Instagram-must Сеула. Вход бесплатный: просто заходи, садись с кофе и фотографируй. Лучший кадр — снизу вверх на стеллажи с лестницы в центре. Здесь же кондиционер и тысячи реальных книг — можно читать хоть весь день','10:30–22:00',null,'서울 강남구 영동대로 513',null,'in','30–60 мин');
add('photo',37.5440,127.0560,'Eungbongsan','응봉산','94м — лучший вид на Ханган. 0 туристов','Небольшая гора 94 м с лучшим видом на Ханган в черте города — и почти без иностранных туристов. Подъём по лестнице занимает 20 минут, наверху — смотровая площадка с панорамой реки, мостов и района Сонгсу. Лучшее время — за час до заката: солнце садится прямо за мосты, цвета меняются каждые 10 минут. Бесплатно, вход у метро Ыннамну','Круглосуточно',null,'서울 성동구 응봉동','Eungbong mountain Seoul Han River view','out','1–1.5 ч');
add('photo',37.5443,126.9777,'NOOP Cafe','누웠카페','Крыша + Намсан прямо в кадре. Качели, иглу','Кафе на крыше с открытой террасой, откуда башня Намсан стоит прямо в кадре — без телескопа и без усилий. На крыше — качели, белые иглу-павильоны и шезлонги. Платишь только за напиток (~8,000–12,000₩). На закат лучше бронировать место заранее через Instagram или Naver: желающих много, мест мало','~11:00–22:00',null,'서울 용산구 신흥로 60',null,'out','1–2 ч','noopcafe');
add('photo',37.5449,127.0457,'HAUS NOWHERE','하우스 노웨어','Gentle Monster 14 этажей! Роботы, скульптуры, инсталляции','Новый 14-этажный флагман Gentle Monster (2025) — каждый этаж как отдельная арт-вселенная с роботами, кинетическими скульптурами и сюрреалистическими сценами. Вход бесплатный. Специально создано для контента. Самый фотографируемый бренд-спейс Сеула','11:00–21:00',null,'서울 성동구 뚝섬로 433',null,'in','30–60 мин');
add('photo',37.5685,126.9640,'Ihwa Mural Village','이화벽화마을','"Ангельские крылья", рыбы на лестнице','Деревня с муралами на крутых лестницах у горы Нансан — главный кадр это "ангельские крылья" на стене (вставай между ними для фото) и рыбы-карпы на ступеньках. Узкие улочки поднимаются вверх, за каждым поворотом — новая роспись. Приходи до 8 утра: пусто, тихо, мягкий свет. Вход бесплатный, добраться пешком от метро Хёндэ (выход 2)','Круглосуточно',null,'서울 종로구 이화동',null,'out','1–2 ч');
add('photo',37.5175,127.1045,'Lonely Tree','나홀로나무','Кипарис в поле Olympic Park. Культовый кадр','Одинокое дерево посреди открытого луга Олимпийского парка — один из самых узнаваемых кадров Сеула. Вокруг — только трава, поэтому дерево стоит как живая скульптура на фоне неба. Лучший свет — золотой час за час до заката или ранее утро с туманом. Бесплатно, вход в парк открыт с 05:00, дерево в восточной части парка рядом с ориентиром "88잔디마당"','05:00–22:00',null,'서울 송파구 올림픽공원 내','Seoul Olympic Park lonely tree','out','30–60 мин');
add('photo',37.5250,126.9330,'Nodeul Island','노들섬','Архитектура + N Tower на горизонте','Маленький культурный остров на реке Ханган с живой музыкой, книжным магазином и кафе прямо у воды. С пешеходного моста — открытый вид на башню N Seoul Tower на горизонте: идеальный кадр в сумерки, когда башня подсвечивается. Бесплатно добраться пешком с берега. На острове часто бывают бесплатные концерты и маркеты — проверь расписание','Круглосуточно',null,'서울 용산구 양녕로 445',null,'out','1–1.5 ч');
add('photo',37.5640,127.0090,'Dior Seongsu','디올 성수','Стеклянная "теплица". Иконический кадр','Поп-ап магазин Dior в районе Сонгсу — стеклянный павильон в форме теплицы, весь в живых растениях и белых конструкциях. Вход снаружи бесплатный: снимай фасад, стеклянные панели, отражения. Внутрь пускают только клиентов, но самый красивый кадр всё равно снаружи. Лучший свет — утро (тени от растений падают красиво) или пасмурный день','11:00–20:00',null,'서울 성동구 연무장15길 15',null,'in','30 мин');
add('photo',37.5320,126.9570,'Seoul Botanic Garden','서울식물원','Купол 100м, ночная подсветка','Огромный стеклянный купол 100 м диаметром с тропическими растениями со всего мира — внутри тепло, зелено и красиво в любую погоду. Вечером после 18:00 включают подсветку — растения и конструкции купола светятся разными цветами. Вход 3,000₩ (студентам дешевле). Снаружи — парк с прогулочными дорожками, бесплатный','09:30–18:00/22:00',null,'서울 강서구 마곡동로 161',null,'both','1.5–2 ч');

add('market',37.5700,126.9995,'Gwangjang Market','광장시장','Старейший 1905. Netflix. Юкхве, биндэттог','Старейший крытый рынок Кореи (1905 год), попавший в документальный сериал Netflix — и с тех пор культовый. Обязательно попробовать: юкхве (маринованная сырая говядина с желтком, ~15,000₩), биндэттог (жирный блин из маша, ~5,000₩), майак кимпаб ("наркотические" роллы за 3,000₩). Садись за стойку к хальмони — так аутентичнее всего. 2й этаж — фудхолл с сидячими местами','08:30–23:00',null,'서울 종로구 창경궁로 88',null,'in','1–2 ч');
add('market',37.5590,126.9774,'Namdaemun Market','남대문시장','Крупнейший, 10,000+ лавок. Ранее утро','Крупнейший традиционный рынок Кореи — 10,000+ лавок с одеждой, едой, подарками и специями. Приходи ранним утром до 8:00: торговцы открываются, людей мало, можно спокойно ходить. Попробуй кальгуксу (суп с лапшой, ~8,000₩) и хотток (жареный блин с орехами, ~2,000₩). Воскресенье — выходной у большинства лавок. Торгуйся — здесь это норма','05:00–18:00',null,'서울 중구 남대문시장4길 21',null,'both','1.5–2 ч');
add('market',37.5559,126.9063,'Mangwon Market','망원시장','Местный рынок, хотток, рисовые пончики','Живой районный рынок без туристов — сюда ходят местные за продуктами и едой. Обязательно: хотток с орехами (~2,000₩), рисовые пончики тток (~1,500₩), свежие фрукты нарезкой. Отличное место для закупки пикника перед прогулкой на берег Хангана — 10 мин пешком до парка. Только наличные, карты берут редко. Понедельник — выходной','08:00–22:00, Пн выходной',null,'서울 마포구 포은로8길 14',null,'in','1–1.5 ч');
add('market',37.5807,126.9699,'Tonin Market','통인시장','"Монеты" 엽전 — собери свой набор','Уникальный формат: покупаешь на входе монеты-엽전 (10 монет = 5,000₩) и расплачиваешься ими в лавках с корейской едой. Собери свой ланч-бокс из рисового кимпаба, тток, чапче, панчан — всего по чуть-чуть. Рынок маленький и камерный, туристов мало. Рядом — резиденция президента Кёнбоккун. Работает только до 17:00, приходи к 12:00','11:00–17:00',null,'서울 종로구 자하문로15길 18',null,'in','1–1.5 ч');
add('market',37.5715,127.0171,'Dongmyo Flea','동묘벼룩시장','600 стендов. Винтаж от 1,000₩. GD-аллея','600+ стендов с винтажной одеждой, обувью, пластинками и всяким хламом от 1,000₩. Главная аллея — "GD street" (назван в честь G-Dragon): здесь самый крутой дизайнерский секонд-хенд. Приходи до 12:00 — лучший выбор, самые свежие поступления. Обязательно торгуйся: первая цена всегда завышена на 30–50%. Рядом — храм Донгмё с китайским богом войны','09:00–20:00',null,'서울 종로구 숭인동',null,'out','1–2 ч');

add('hidden',37.5920,126.9650,'Buam-dong','부암동','Место из "Паразитов". Seoul 1970-х нетронутый','Тихий холмистый квартал у горы Инвансан, где снимали сцены фильма "Паразиты" — застройку запрещено менять, поэтому Сеул 1970-х здесь нетронутый. Маленькие галереи и кафе в старых домах, извилистые улочки, вид на горы. Наверху — кафе Санмотунге с панорамными окнами прямо на гору Пукхансан. Добраться: автобус 7022 от Кёнбоккуна (5 мин)','Круглосуточно',null,'서울 종로구 부암동',null,'out','2–3 ч');
add('hidden',37.5890,126.9920,'Seongbuk-dong','성북동','Посольства, старые особняки, вишня без толп','Закрытый холмистый квартал с посольствами, старыми особняками и традиционными ресторанами — один из самых тихих уголков Сеула. Весной цветёт сакура вдоль улиц без единого туриста. Здесь находился дом поэта Ким Дон Ина и вилла художника Ли Джун Сопа — таблички на домах. Бесплатно, пешком от метро Хансон-дэ (выход 6)','Круглосуточно',null,'서울 성북구 성북동',null,'out','2–3 ч');
add('hidden',37.6130,126.9230,'Eunpyeong Hanok','은평한옥마을','Новые ханоки + Пукхансан. 0 иностранцев','Новая ханок-деревня у подножия горы Пукхансан — специально построенные традиционные дома, а не отреставрированные старые. Аутентичный вид снаружи при современных удобствах внутри. Иностранных туристов почти нет — только жители квартала. В 10 мин ходьбы — буддийский храм Чингванса в густом лесу. Идеально совмещать с треккингом на Пукхансан','Круглосуточно',null,'서울 은평구 진관동',null,'out','2–3 ч');
add('hidden',37.5730,126.9920,'Ikseon-dong','익선동','Ханоки 1920-х → кафе. Вечер = атмосфера','Квартал традиционных ханок 1920-х годов, переделанных в уютные кафе, уютные кафе и маленькие ресторанчики — не снося стены, а работая внутри старых строений. Узкие переулки с бумажными фонариками — особенно атмосферны вечером. Рядом — рынок Кванджан. Бесплатно гулять, только плати за еду и кофе','Круглосуточно',null,'서울 종로구 익선동',null,'both','2–3 ч');
add('hidden',37.5560,126.9095,'Gyeongui Line Forest','경의선숲길','Бывшая ж/д → парк 6.3 км. Рельсы в дорожке','Бывшая железнодорожная линия, превращённая в 6.3 км линейного парка — в асфальт вмонтированы рельсы как арт-элемент. По обеим сторонам — кафе, цветочные магазины, книжные лавки в переулках района Ённом. Особенно хороша днём в будни: молодые местные с кофе, велосипедисты, но без туристических толп. Бесплатно. Начни от метро Хондэ','Круглосуточно',null,'서울 마포구 연남동',null,'out','1.5–2 ч');
add('hidden',37.5650,126.9430,'Mullae Art Village','문래창작촌','Сталелитейные цеха + граффити + арт','Промышленный квартал, где металлообрабатывающие мастерские соседствуют с галереями и мастерскими художников — прямо между сварочными цехами. Стены покрыты масштабными муралами. Это настоящий живой арт-квартал, не туристический: художники здесь реально работают. Лучшее время — днём в будни, когда открыты мастерские. Вход бесплатный','Круглосуточно',null,'서울 영등포구 문래동3가',null,'out','1–2 ч');
add('hidden',37.5815,126.9740,'Tonin + Seochon','서촌','Квартал за дворцом: тихие кафе, галереи, ханбок','Квартал Сочхон за западной стеной Кёнбоккуна — любимое место сеульских художников и интеллигенции. Узкие переулки с галереями, кофейнями в традиционных домах, мастерскими каллиграфии. Здесь жил художник Ли Сан, здесь прокат ханбока для прогулки по дворцу рядом. Лучшее время — утро до 10:00: только местные, тишина и утреннее освещение','Круглосуточно',null,'서울 종로구 통의동',null,'out','2–3 ч');

add('trek',37.5685,126.9655,'Naksan + Wall','낙산공원 성곽길','Крепость XIV века + муралы. Вечерняя подсветка','Прогулка по крепостной стене XIV века, которая идёт через холм Накхансан — с одной стороны стена, с другой — панорама города. Вдоль подъёма — улица Накхан с муралами и маленькими кафе. Вечером стену подсвечивают: золотистый камень на фоне тёмного неба. Бесплатно, подъём несложный, обычная обувь подойдёт','Круглосуточно',null,'서울 종로구 낙산길 41',null,'out','1–1.5 ч');
add('trek',37.5840,126.9590,'Inwangsan','인왕산','338м. Вид на Кёнбоккун сверху + весна = азалии','Гора 338 м прямо в черте Сеула с видом сверху на дворец Кёнбоккун и центральный Сеул. Подъём через гранитные скалы с видовыми площадками по пути — около 1 часа. Весной (апрель) склоны покрыты розовыми азалиями — лучший сезон. Популярен для ночного хайка: в ясную ночь огни Сеула видны до горизонта. Бесплатно, треккинговая обувь желательна','Рассвет–закат',null,'서울 종로구 인왕산로',null,'out','2 ч');
add('trek',37.5850,126.9480,'Ansan Jarak-gil','안산자락길','Безбарьерный! 7км деревянный настил, виды','Круговой маршрут 7 км по деревянному настилу вокруг горы Ансан — единственный в Сеуле полностью безбарьерный горный трейл (подходит для колясок). Никаких подъёмов по камням — только ровный настил через лес с видами на город в просветах между деревьями. Лучший трейл если хочется природы, но не хочется сложного хайка. Бесплатно, любая обувь','Круглосуточно',null,'서울 서대문구 봉원동','Ansan Seoul','out','2–2.5 ч');
add('trek',37.5530,127.1040,'Achasan','아차산','287м. Ханган целиком сверху. Рассвет','Гора 287 м с лучшим видом на реку Ханган во всю ширину — видно оба берега, мосты и Олимпийский парк внизу. Подъём занимает 40 минут по хорошей тропе. Приходи на рассвет: туман над рекой, первое солнце — один из лучших рассветов Сеула. Бесплатно, вход от метро Ачасан (выход 2). Обычные кроссовки подойдут','Круглосуточно',null,'서울 광진구 아차산로',null,'out','1–1.5 ч');
add('trek',37.6500,126.9800,'Bukhansan Dulle-gil 8','북한산 둘레길 8구간','Подвесной мост над лесом. Лёгкий, 2ч','8-й участок окружного маршрута горы Пукхансан — лёгкий лесной трейл с главной достопримечательностью: подвесной мост над лесным ущельем, с которого видны вершины Пукхансана. Без крутых подъёмов, подходит для любого уровня. Утром — роса на листьях и туман в долине. Бесплатно, добраться от метро Пульгван (выход 1). Кроссовки подойдут','Круглосуточно',null,'서울 은평구 불광동','Bukhansan National Park Seoul','out','2–3 ч');

add('museum',37.5238,126.9804,'National Museum','국립중앙박물관','Крупнейший музей Кореи. Бесплатно!','Крупнейший музей Кореи и один из крупнейших в Азии — 220,000 экспонатов от каменного века до Чосон. Не пропустить: 10-метровый буддийский пагон경천사 на первом этаже и зал с золотыми коронами Силла. Вход бесплатный, внутри лифты и кафе. По средам и субботам работает до 21:00 — можно совместить с прогулкой по парку у реки','09:30–18:00/21:00',null,'서울 용산구 서빙고로 137',null,'in','2–4 ч');
add('museum',37.5360,126.9770,'War Memorial','전쟁기념관','Военная техника на улице. Бесплатно','Огромный музей с боевой техникой под открытым небом — танки, самолёты, военные корабли можно обойти вплотную. Внутри — экспозиция про Корейскую войну 1950–53, разделение Кореи и современную армию. Всё с аудиогидом на английском. Вход полностью бесплатный, понедельник — выходной. Рядом — посольский квартал Итэвон','09:30–18:00',null,'서울 용산구 이태원로 29',null,'both','2–3 ч');
add('museum',37.5788,126.9800,'MMCA Seoul','국립현대미술관','Современное искусство у Кёнбоккун','Национальный музей современного искусства прямо у стен Кёнбоккуна — постоянная коллекция корейского современного искусства 20–21 века бесплатна. Временные выставки обычно 2,000–4,000₩. Здание само по себе интересно: часть построена в бывших военных казармах. По средам и пятницам работает до 21:00 — идеально после дворца','10:00–18:00/21:00',null,'서울 종로구 삼청로 30',null,'in','1.5–2 ч');
add('museum',37.5234,126.9808,'Leeum Museum','리움미술관','Частный Samsung. Рем Колхаас + Жан Нувель','Частный музей Samsung с тремя зданиями от звёздных архитекторов — Рем Колхаас, Жан Нувель и Марио Ботта. Внутри: корейские артефакты от керамики Сильи до современных Ли Ун Бэ. Одна из лучших коллекций частного искусства в Азии. ~10,000₩ (постоянная коллекция). Временные выставки — отдельно. Понедельник — выходной. Рядом — холм Хэбанчхон','10:00–18:00, Пн выходной',null,'서울 용산구 이태원로55길 60-16',null,'in','1.5–2 ч');

add('event',37.5440,127.0440,'Green Market 18-19','한강플플 그린마켓','Эко-маркет + хендмейд + концерт','Эко-маркет на берегу Хангана в парке Ттуксом: мастера хендмейда, органическая еда, ноль-отходные продукты и живая музыка. Бесплатный вход, платишь только за покупки. 12:00–20:00, 18–19 апреля. Хорошо совмещать с пикником — купи еду здесь, расстели плед у воды рядом','18-19 апреля',null,'뚝섬한강공원 자벌레',null,'out','2–3 ч');
add('event',37.5443,127.0510,'Drone Show 25 апр','드론라이트쇼','300 дронов над Ханганом!','300 дронов одновременно рисуют фигуры и анимацию в ночном небе над рекой Ханган — 15-минутное шоу. Начало в 20:30, 25 апреля. Занимай место на берегу заранее — к 20:00 там уже толпа. Вход бесплатный, приходи с едой и пледом. Смотреть лучше с парковой лужайки у воды, а не с моста','25 апреля',null,'뚝섬한강공원','Seoul Hangang River night','out','30 мин');
add('event',37.5260,126.9340,'Signature Show','시그니처쇼','Карусель на воде + лазеры + спецэффекты','Бесплатное шоу на воде у каскадного фонтана в парке Ёыйдо: плавающая светящаяся карусель, лазерные лучи над рекой и спецэффекты с водой. Два показа — в 20:00 и 21:00. Каждые выходные до 5 мая. Приходи за 20 мин, места у воды быстро занимают. Хорошо совмещать с чикен-пивом на берегу до или после шоу','Каждые выходные до 5 мая',null,'여의도한강공원 캐스케이드광장',null,'out','30 мин');
add('event',37.5170,126.9590,'Car-Free Jamsu','잠수교','Мост закрыт для машин. Маркет, еда, отдых','Каждое воскресенье мост Чамсу перекрывают для машин — и он превращается в пешеходный фестиваль над рекой. Маркеты с едой и хендмейдом, уличные музыканты, место для пикника прямо на асфальте моста с видом на воду. Бесплатный вход. Местная традиция — взять чикен и макгёли и сидеть на мосту. Добраться от метро Хандже','Каждое воскресенье',null,'서울 서초구 잠수교',null,'out','2–3 ч');
add('event',37.5755,126.9769,'Outdoor Library','서울야외도서관','Книги + бинбэги под открытым небом','Сезонная библиотека прямо на площади Кванхвамун: полки с книгами под открытым небом, бинбэги и шезлонги. Бери любую книгу, устраивайся на площади с видом на гору Пукхансан и дворец Кёнбоккун в конце улицы. Работает с 23 апреля, четверг–воскресенье 11:00–18:00. Бесплатно. Книги в основном корейские, но атмосфера стоит захода','Чт–Вс 11:00–18:00',null,'광화문광장',null,'out','1–2 ч');
add('event',37.5794,126.9910,'Moonlight Walk','창덕궁 달빛기행','Дворец ночью с фонарями','Ночная экскурсия по дворцу Чандоккун с традиционными фонарями — один из самых романтичных опытов в Сеуле. Павильоны и сады освещены мягким светом, группы небольшие, гид ведёт по Тайному саду. 30,000₩, билеты только через лотерею онлайн (очень быстро разбирают — следи за сайтом). Работает чт–вс до конца мая','Чт–Вс до 31 мая',null,'서울 종로구 율곡로 99',null,'out','2 ч');

add('shop',37.5635,126.9860,'Myeongdong','명동','K-beauty, Olive Young, стритфуд','Главная туристическая улица Сеула для K-beauty шоппинга: Olive Young (корейская аптека-косметика), Innisfree, Etude, Tony Moly — всё в одном квартале. Стритфуд вдоль улицы: тток болоки (~4,000₩), хотток, мини-яйца-кокосы. Вечером полно, утром (до 12:00) спокойнее и можно нормально примерять. Разрешено без рецепта: тонеры, сыворотки, патчи','10:00–22:00',null,'서울 중구 명동길',null,'both','2–3 ч');
add('shop',37.5500,127.0450,'Seongsu Pop-ups','성수동','Pop-up каждую неделю. Gentle Monster, Dior','Район Сонгсу — корейский Бруклин: бывшие заводы занял дизайн, концепт-кафе и поп-апы мировых брендов. Каждую неделю появляются новые временные магазины — Gentle Monster, Dior, Nike, локальные дизайнеры. Проверь Instagram Stories с хэштегом #성수팝업 перед визитом — узнаешь что открылось. Помимо шоппинга: кофейные концепт-кафе и очередь за самым Instagram-famous зефиром Сеула','11:00–21:00',null,'서울 성동구 성수동',null,'both','2–3 ч');
add('shop',37.5170,127.0470,'COEX Mall','코엑스몰','Подземный мегамолл + библиотека + аквариум','Огромный подземный торговый центр в Каннаме — 3 этажа с 300+ магазинами, фудкортом и кинотеатром. Внутри — Starfield Library (фото-спот бесплатный), аквариум Coex (25,000₩), зал SMTown с K-pop артефактами. Хорошее место для спасения от жары или дождя — кондиционер, еда, развлечения. Соединён переходом с выставочным центром COEX','10:30–22:00',null,'서울 강남구 영동대로 513',null,'in','2–3 ч');
add('shop',37.5260,127.0280,'The Hyundai Seoul','더현대서울','Самый красивый универмаг Кореи','Универмаг с атриумом до потолка — живые деревья, водопад и естественный свет прямо внутри здания. Архитектурно это больше парк чем магазин. Этажи с корейскими дизайнерами, поп-апами и гастрономическим рынком B1. Очереди за самым популярным корейским тортом чаще всего именно здесь. Завтраки в ресторанах B1 — один из лучших гастрономических опытов Сеула','10:30–22:00',null,'서울 영등포구 여의대로 108',null,'in','2–3 ч');
add('shop',37.5195,127.0225,'Garosu-gil','가로수길','Платановая аллея, бутики, кафе, галереи','Широкая аллея платанов в Сине-чон с дизайнерскими бутиками, концепт-кафе, небольшими галереями и ресторанами на открытых верандах. Более взрослая и спокойная альтернатива Мёндон — меньше туристов, выше ценник, лучше качество. Параллельные переулки (세로수길) ещё тише и атмосфернее. Хорошо для неспешной прогулки и шоппинга категории выше среднего','Круглосуточно',null,'서울 강남구 신사동 가로수길',null,'out','1.5–2 ч');

add('district',37.5570,126.9250,'Hongdae','홍대','Арт + уличные артисты. Вечером!','Самый энергичный студенческий район Сеула — в любой вечер пятница-суббота: уличные выступления (K-pop каверы, джаз, магия) у выхода из метро, стены с граффити, клубы, поп-апы. Днём — кафе и независимые магазины, вечером — всё оживает. Особенный опыт: поиграть в уличный баскетбол или посмотреть бесплатный перформанс прямо на площади','Круглосуточно',null,'홍대입구역',null,'out','3–4 ч');
add('district',37.5345,126.9930,'Itaewon','이태원','Мировые кухни, космополитичность','Самый интернациональный район Сеула: турецкая, мексиканская, индийская, итальянская, халяльная кухня — всё рядом. Главная улица плюс переулки경리단길 и 해방촌 — там лучшие независимые рестораны. Для тех кто не ест глютен: здесь больше GF-опций чем в любом другом районе. Вечером — уютные рестораны и живая музыка разных жанров','Круглосуточно',null,'이태원역',null,'both','3–4 ч');
add('district',37.5410,126.9880,'Haebangchon','해방촌','Богемный холм над Итэвоном. Золотой закат','Богемный холмистый квартал над Итэвоном — маленькие независимые кафе, нишевые бары и галереи на крутых улочках. С вершины холма и с алтаря Бугунданг в конце главной улицы — открытый вид на закат и огни Намсана. Поднимайся пешком от станции Нокcапхён (выход 2) — сам подъём уже интересный. Лучшее время — вечер','Вечер',null,'녹사평역',null,'out','1.5–2 ч');
add('district',37.5380,126.9860,'Gyeongridan-gil','경리단길','Камерные кафе, вид на Намсан, уличные столики','Улица, которая поднимается в гору от Итэвона — по пути открывается всё лучший вид на башню Намсан. Вдоль неё: маленькие авторские кафе с уличными столиками, независимые рестораны и дизайн-магазины. Лучший маршрут — подняться по Кёнридан, выпить кофе с видом на закат, спуститься в Итэвон на ужин. От метро Итэвон, выход 3','Вечер',null,'이태원역 3번출구',null,'out','1.5–2 ч');

const legend = L.control({position: 'topright'});
legend.onAdd = () => {
  const div = L.DomUtil.create('div', 'legend');
  const isMobile = window.innerWidth <= 600;
  const collapsed = isMobile ? ' collapsed' : '';
  const arrow = isMobile ? '▶' : '▼';
  let html = `<div class="legend-title">🇰🇷 Seoul <button class="legend-toggle" onclick="toggleLegend()">${arrow}</button></div><div class="legend-body${collapsed}" id="legend-body"><div style="font-size:11px;color:#888;margin-bottom:8px">Клик → фото + детали<br>Свайп → ещё фото<br>Клик фото → на весь экран</div>`;
  Object.entries(CAT).forEach(([k, v]) => {
    html += `<div class="filter-btn" id="fb-${k}" onclick="toggle('${k}')"><span class="dot" style="background:${C[k]}"></span>${v.n}</div>`;
  });
  html += `<div style="margin-top:8px;font-size:11px;color:#aaa">${Object.values(layers).reduce((s,l)=>s+l.getLayers().length,0)} мест</div>`;
  html += `<div class="io-filter">
  <div style="font-size:12px;font-weight:600;margin-bottom:4px">Тип:</div>
  <button class="io-btn active" id="io-all" onclick="filterIO('all')">Все</button>
  <button class="io-btn" id="io-out" onclick="filterIO('out')">☀️ Outdoor</button>
  <button class="io-btn" id="io-in" onclick="filterIO('in')">🏠 Indoor</button>
</div></div>`;
  div.innerHTML = html;
  return div;
};
legend.addTo(map);

window.toggle = function(k) {
  const btn = document.getElementById(`fb-${k}`);
  if (map.hasLayer(layers[k])) { map.removeLayer(layers[k]); btn.classList.add('off'); }
  else { map.addLayer(layers[k]); btn.classList.remove('off'); }
};

// Легенда: сворачивание на мобильных
window.toggleLegend = function() {
  const body = document.getElementById('legend-body');
  const btn = document.querySelector('.legend-toggle');
  body.classList.toggle('collapsed');
  btn.textContent = body.classList.contains('collapsed') ? '▶' : '▼';
};
// Fullscreen: touch-свайп для фото
(function() {
  const fsEl = document.getElementById('fs');
  let touchStartX = 0;
  let touchStartY = 0;
  fsEl.addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].screenX;
    touchStartY = e.changedTouches[0].screenY;
  }, {passive: true});
  fsEl.addEventListener('touchend', function(e) {
    const dx = e.changedTouches[0].screenX - touchStartX;
    const dy = e.changedTouches[0].screenY - touchStartY;
    if (Math.abs(dx) < 40 || Math.abs(dy) > Math.abs(dx)) return;
    if (dx < 0) fsNav(1);
    else fsNav(-1);
  }, {passive: true});
})();

window.filterIO = function(mode) {
  document.querySelectorAll('.io-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('io-' + mode).classList.add('active');
  Object.values(layers).forEach(lg => {
    lg.eachLayer(m => {
      const mio = m.options.io || 'both';
      if (mode === 'all' || mio === mode || mio === 'both') {
        m.setOpacity(1);
        if (m._icon) m._icon.style.display = '';
      } else {
        m.setOpacity(0);
        if (m._icon) m._icon.style.display = 'none';
      }
    });
  });
};
</script>
